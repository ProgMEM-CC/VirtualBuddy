name: Build VirtualBuddy

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Set Scheme
        run: echo "SCHEME=VirtualBuddy" >> $GITHUB_ENV

      - name: Build
        run: |
          if ls *.xcworkspace 1> /dev/null 2>&1; then
            filetype_parameter="-workspace"
            file_to_build=$(ls -A *.xcworkspace | head -n 1)
          else
            filetype_parameter="-project"
            file_to_build="VirtualBuddy.xcodeproj"
          fi

          echo "Building scheme: $SCHEME"
          echo "Using: $filetype_parameter $file_to_build"

          xcodebuild clean build \
            $filetype_parameter "$file_to_build" \
            -scheme "$SCHEME" \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      - name: Locate .app
        run: |
          APP_PATH=$(find build -type d -name "VirtualBuddy.app" | head -n 1)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          echo "Found app at $APP_PATH"

      - name: Package .app
        run: |
          mkdir -p artifacts
          if [ -d "$APP_PATH" ]; then
            cp -R "$APP_PATH" artifacts/
          else
            echo "Error: .app not found"
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: artifacts/
